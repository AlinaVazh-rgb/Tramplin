<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Трамплин</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <i class="fas fa-rocket"></i> Трамплин
            </a>
            <div>
                <a href="/login" class="nav-link">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </a>
                <a href="/register" class="nav-link">
                    <i class="fas fa-user-plus"></i> Регистрация
                </a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 80px;">
        <div class="card fade-in">
            <div class="card-header" style="text-align: center;">
                <i class="fas fa-user-circle" style="font-size: 3rem;"></i>
                <h2 style="margin-top: 10px;">Добро пожаловать</h2>
                <p>Войдите в свой аккаунт</p>
            </div>
            <div class="card-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email или логин</label>
                        <input type="text" class="form-control" id="username" required placeholder="Введите email или логин">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" class="form-control" id="password" required placeholder="Введите пароль">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="/register" style="color: #667eea;">Нет аккаунта? Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                if (response.ok) {
                    const data = await response.json();
                    alert('✅ Вход выполнен успешно!');
                    window.location.href = data.redirect_url;
                } else {
                    const error = await response.json();
                    alert('❌ ' + error.detail);
                }
            } catch (error) {
                alert('❌ Ошибка соединения с сервером');
            }
        });
    </script>
</body>
</html>
