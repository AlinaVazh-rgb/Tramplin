<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Трамплин</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-rocket me-2"></i>Трамплин
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center">
                        <h3 class="mb-0">Регистрация</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                                <small class="text-muted">Пример: name@domain.ru</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Имя пользователя</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Подтверждение пароля</label>
                                <input type="password" class="form-control" id="password2" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Роль</label>
                                <select class="form-select" id="role" required>
                                    <option value="seeker">Соискатель</option>
                                    <option value="employer">Работодатель</option>
                                </select>
                            </div>
                            
                            <!-- Поля для работодателя (появляются при выборе роли "Работодатель") -->
                            <div id="employerFields" style="display: none;">
                                <div class="alert alert-info">
                                    <i class="fas fa-info-circle me-2"></i>
                                    После регистрации ваша компания будет отправлена на верификацию.
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Название компании *</label>
                                    <input type="text" class="form-control" id="companyName" placeholder="ООО Ромашка">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">ИНН</label>
                                    <input type="text" class="form-control" id="inn" placeholder="1234567890">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Сайт компании</label>
                                    <input type="url" class="form-control" id="website" placeholder="https://example.com">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Сфера деятельности (необязательно)</label>
                                    <input type="text" class="form-control" id="industry" placeholder="Информационные технологии">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                            </button>
                        </form>
                        <div class="mt-3 text-center">
                            Уже есть аккаунт? <a href="/login">Войти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Показ дополнительных полей для работодателя
        document.getElementById('role').addEventListener('change', function() {
            const employerFields = document.getElementById('employerFields');
            employerFields.style.display = this.value === 'employer' ? 'block' : 'none';
        });

        // Отправка формы
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const role = document.getElementById('role').value;
            
            // Проверка email
            const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert('❌ Введите корректный email (например: name@domain.ru)');
                return;
            }
            
            if (username.length < 3) {
                alert('❌ Имя пользователя должно быть не менее 3 символов');
                return;
            }
            
            if (password !== password2) {
                alert('❌ Пароли не совпадают');
                return;
            }
            
            if (password.length < 4) {
                alert('❌ Пароль должен быть не менее 4 символов');
                return;
            }
            
            const userData = {
                email: email,
                username: username,
                password: password,
                role: role
            };
            
            // Если работодатель - добавляем дополнительную информацию
            if (role === 'employer') {
                userData.company_name = document.getElementById('companyName').value;
                userData.inn = document.getElementById('inn').value;
                userData.website = document.getElementById('website').value;
                userData.industry = document.getElementById('industry').value;
            }
            
            console.log('Отправка данных:', userData);
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                console.log('Ответ:', result);
                
                if (response.ok) {
                    alert('✅ Регистрация успешна! Теперь вы можете войти.');
                    window.location.href = '/login';
                } else {
                    let errorMsg = result.detail || 'Неизвестная ошибка';
                    if (typeof errorMsg === 'object') {
                        errorMsg = JSON.stringify(errorMsg);
                    }
                    alert('❌ Ошибка: ' + errorMsg);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка соединения: ' + error.message);
            }
        });
    </script>
</body>
</html>
